name: Auto Approve Jules Bot and wwd1115

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    # 核心修改：只要是机器人或 wwd1115 触发的 PR，都执行自动同意
    if: github.actor == 'google-labs-jules[bot]' || github.actor == 'wwd1115'
    steps:
      - name: Approve Pull Request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr review --approve "$PR_URL"
